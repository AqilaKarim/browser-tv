<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My TV</title>

<style>

body{
background:#000;
color:white;
font-family:sans-serif;
margin:0;
text-align:center;
}

h1{
padding:20px;
font-size:36px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
padding:30px;
}

.channel{
background:#1c1c1c;
border-radius:16px;
padding:20px;
text-decoration:none;
color:white;
transition:.2s;
cursor:pointer;
}

.channel:hover{
background:#333;
transform:scale(1.05);
}

.channel img{
width:100%;
height:120px;
object-fit:contain;
margin-bottom:10px;
}

.name{
font-size:22px;
}

/* back button */

.backButton{
position:fixed;
top:20px;
left:20px;
background:#e50914;
color:white;
padding:12px 18px;
border-radius:10px;
font-size:18px;
cursor:pointer;
z-index:9999;
display:none;
}

</style>

<script>

function openChannel(url){
localStorage.setItem("lastChannel",url);
window.location=url;
}

function autoFullscreen(){

setTimeout(()=>{

let video=document.querySelector("video");

if(video){
video.requestFullscreen().catch(()=>{});
}

},2000);

}

function createBackButton(){

let btn=document.createElement("div");
btn.className="backButton";
btn.innerText="⬅ Channels";

btn.onclick=function(){
window.location.href="tv.html";
};

document.body.appendChild(btn);
btn.style.display="block";

}

window.onload=function(){

if(!window.location.href.includes("tv.html")){
createBackButton();
autoFullscreen();
}

}

</script>

</head>

<body>

<h1>📺 TV Channels</h1>

<div class="grid">

<div class="channel" onclick="openChannel('https://www.presstv.ir/LIVE')">
<img src="https://commons.wikimedia.org/wiki/File:Press_TV_logo.svg">
<div class="name">PRESS TV</div>
</div>

<div class="channel" onclick="openChannel('https://www.aparatchi.com/iran-live-tv/farsi-news-tv/iran-international-live')">
<img src="https://static.cdnlogo.com/logos/i/89/iran-international_800.png">
<div class="name">Iran International</div>
</div>
  
<div class="channel" onclick="openChannel('https://www.aparatchi.com/iran-live-tv/farsi-irib-tv/irib1-live')">
<img src="https://upload.wikimedia.org/wikipedia/en/9/9c/IRIB_TV1_logo.png">
<div class="name">IRIB 1</div>
</div>

<div class="channel" onclick="openChannel('https://www.aparatchi.com/iran-live-tv/farsi-irib-tv/irib2-live')">
<img src="https://upload.wikimedia.org/wikipedia/en/3/36/IRIB_TV2_logo.png">
<div class="name">IRIB 2</div>
</div>

<div class="channel" onclick="openChannel('https://www.aparatchi.com/iran-live-tv/farsi-irib-tv/irib3-live')">
<img src="https://upload.wikimedia.org/wikipedia/en/f/f0/IRIB_TV3_logo.png">
<div class="name">IRIB 3</div>
</div>

<div class="channel" onclick="openChannel('https://www.aparatchi.com/iran-live-tv/farsi-irib-tv/irib-tv4')">
<img src="https://upload.wikimedia.org/wikipedia/en/5/5b/IRIB_TV4_logo.png">
<div class="name">IRIB 4</div>
</div>

<div class="channel" onclick="openChannel('https://www.aparatchi.com/iran-live-tv/farsi-irib-tv/shabakeh-khabar-live')">
<img src="https://upload.wikimedia.org/wikipedia/en/0/0c/IRINN_logo.png">
<div class="name">IRINN</div>
</div>

<div class="channel" onclick="openChannel('https://www.aparatchi.com/iran-live-tv/farsi-irib-tv/irinn-2-shabakeh-khabar-2')">
<img src="https://commons.wikimedia.org/wiki/File:IRIB_IRINN_2_Logo_2025.png">

</div>

<div class="channel" onclick="openChannel('https://www.aparatchi.com/iran-live-tv/farsi-film-tv/ifilm-persian')">
<img src="https://upload.wikimedia.org/wikipedia/en/2/2a/IFilm_logo.png">

</div>

<div class="channel" onclick="openChannel('https://www.aparatchi.com/iran-live-tv/farsi-news-tv/bbc-farsi-live-tv')">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/52/BBC_Persian_logo.png">
<div class="name">BBC Persian</div>
</div>

</div>

</body>
</html>
